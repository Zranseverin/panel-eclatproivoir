services:
  # Service Application Laravel (développement)
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: laravel-app-dev
    container_name: laravel-app-dev
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./storage/logs:/var/www/storage/logs
    networks:
      - laravel
    depends_on:
      - mysql
      - redis
    environment:
      - APP_ENV=local
      - APP_DEBUG=true

  # Service Nginx
  nginx:
    image: nginx:alpine
    container_name: laravel-nginx-dev
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx:/etc/nginx/conf.d
    networks:
      - laravel
    depends_on:
      - app

  # Service MySQL
  mysql:
    image: mysql:8.0
    container_name: laravel-mysql-dev
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: eclat_back
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_PASSWORD: password123
      MYSQL_USER: laravel
    volumes:
      - mysql_data_dev:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    ports:
      - "3307:3306"  # ← CHANGEZ ICI (au lieu de 3306:3306)
    networks:
      - laravel

  # Service Redis
  redis:
    image: redis:alpine
    container_name: laravel-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - laravel

  # Service Node.js pour le développement
  node:
    image: node:18-alpine
    container_name: laravel-node-dev
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - laravel
    command: npm run dev
    ports:
      - "5173:5173"
    depends_on:
      - app

networks:
  laravel:
    driver: bridge

volumes:
  mysql_data_dev:
    driver: local